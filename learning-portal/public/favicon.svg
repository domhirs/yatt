<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes blink {
      0%, 49% { opacity: 1 }
      50%, 100% { opacity: 0 }
    }
    .cur { animation: blink 1.2s step-end infinite }
  </style>
  <rect width="32" height="32" rx="5" fill="#090e1a"/>
  <text x="4" y="23" font-family="'JetBrains Mono','Courier New',monospace" font-size="18" font-weight="600" fill="#22d3ee">y</text>
  <text class="cur" x="15" y="23" font-family="'JetBrains Mono','Courier New',monospace" font-size="18" font-weight="600" fill="#22d3ee">_</text>
</svg>
